- name: Create backup directory
  file:
    path: "{{ backup_directory }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  when: backup_enabled

- name: Render backup script
  template:
    src: backup.sh.j2
    dest: /usr/local/bin/valheim-backup.sh
    mode: "0755"
    owner: root
    group: root
  when: backup_enabled

- name: Render restore script
  template:
    src: restore.sh.j2
    dest: /usr/local/bin/valheim-restore.sh
    mode: "0755"
    owner: root
    group: root
  when: backup_enabled

- name: Create backup cron job
  cron:
    name: "Valheim daily backup"
    minute: "{{ (backup_schedule.split()[0]) }}"
    hour: "{{ (backup_schedule.split()[1]) }}"
    day: "{{ (backup_schedule.split()[2]) }}"
    month: "{{ (backup_schedule.split()[3]) }}"
    weekday: "{{ (backup_schedule.split()[4]) }}"
    job: "/usr/local/bin/valheim-backup.sh"
    user: root
  when: backup_enabled

- name: Display backup info
  debug:
    msg:
      - "✓ Backups enabled"
      - "  Location: {{ backup_directory }}"
      - "  Schedule: Daily at 03:00 UTC ({{ backup_schedule }})"
      - "  Retention: {{ backup_retention_days }} days"
      - "  Backup command: /usr/local/bin/valheim-backup.sh"
      - "  Restore command: /usr/local/bin/valheim-restore.sh"
